databaseChangeLog:
  - changeSet:
      id: 049-migrate-idtari-resplegal-to-inscription
      author: Aymen
      changes:
        - addColumn:
            tableName: inscription
            columns:
              - column:
                  name: idtari
                  type: BIGINT
        - sql:
            sql: >
              UPDATE moth.inscription i
              SET idtari = r.idtari
              FROM moth.resplegal r
              WHERE i.idresp = r.idresp
        - addForeignKeyConstraint:
            baseColumnNames: idtari
            baseTableName: inscription
            constraintName: fk_inscription_idtari
            referencedColumnNames: idtari
            referencedTableName: tarif
        - dropView:
            ifExists: true
            viewName: v_inscription_light
        - createView:
            encoding: UTF-8
            selectQuery: SELECT e.idelev AS id,
                         i.idinsc AS idinscription,
                         i.dtinscinscription AS dateinscription,
                         i.cdinscstatut AS statut,
                         e.txelevnom AS nom,
                         e.txelevprenom AS prenom,
                         e.dtelevnaissance AS datenaissance,
                         e.cdelevniveau AS niveau,
                         e.cdelevniveauinterne AS niveauinterne,
                         r.txrespnom as nomresponsablelegal,
                         r.txrespprenom as prenomresponsablelegal,
                         r.txrespmobile AS mobile,
                         r.txrespnomautre as nomcontacturgence,
                         r.txrespprenomautre as prenomcontacturgence,
                         r.txrespphoneautre AS mobilecontacturgence,
                         r.txrespville AS ville,
                         r.txrespphoneautre AS mobileautre,
                         r.lorespautonomie as autorisationautonomie,
                         r.lorespmedia as autorisationmedia,
                         i.noinscinscription AS noinscription,
                         p.idperi AS idperiode,
                         r.txrespemail as email,
                         i.cdinsctype as type
                         FROM ((((moth.inscription i
                         JOIN moth.eleve e ON ((e.idinsc = i.idinsc)))
                         JOIN moth.resplegal r ON ((i.idresp = r.idresp)))
                         JOIN moth.tarif t ON ((t.idtari = i.idtari)))
                         JOIN moth.periode p ON ((p.idperi = t.idperi)));
            viewName: v_inscription_light
        - dropView:
            ifExists: true
            viewName: v_eleve_enriched
        - createView:
            encoding: UTF-8
            selectQuery: select e.idelev as id, c.idclas as idclasse, e.txelevnom as nom, e.txelevprenom as prenom, e.dtelevnaissance as datenaissance,
                          e.cdelevniveauinterne as niveauinterne, r.txrespmobile as mobile, r.txrespphoneautre as mobilecontacturgence,
                          r.lorespautonomie as autorisationautonomie, r.lorespmedia as autorisationmedia, r.txrespnom as nomresponsablelegal,
                          r.txrespprenom as prenomresponsablelegal, r.txrespnomautre as nomcontacturgence, r.txrespprenomautre as prenomcontacturgence,
                          e.cdelevresultat as resultat
                          from moth.classe c
                          inner join moth.lien_classe_eleve lce on lce.idclas = c.idclas
                          inner join moth.eleve e on e.idelev = lce.idelev
                          inner join moth.inscription i on i.idinsc = e.idinsc
                          inner join moth.resplegal r on r.idresp = i.idresp;
            viewName: v_eleve_enriched
