databaseChangeLog:
  - changeSet:
      id: 053-insert-ref-traduction-reset-password-mailing
      author: Aymen
      changes:
        - insert:
            tableName: ref_traduction
            columns:
              - column:
                  name: cdtradcle
                  value: mail_reset_password
              - column:
                  name: cdtradvaleur
                  value: subject
              - column:
                  name: txtradfr
                  value: "Réinitialisation de votre mot de passe (AMC)"
        - insert:
            tableName: ref_traduction
            columns:
              - column:
                  name: cdtradcle
                  value: mail_reset_password
              - column:
                  name: cdtradvaleur
                  value: body
              - column:
                  name: txtradfr
                  value: |
                    <!DOCTYPE html>
                    <html>
                    <head>
                      <meta charset="UTF-8">
                      <title>Réinitialisation de votre mot de passe</title>
                    </head>
                    <body style="font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0;">
                      <table align="center" width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; padding: 20px; border-radius: 8px;">
                        <tr>
                          <td style="text-align: center;">
                            <h2 style="color: #333333;">Bonjour, @@{username} !</h2>
                            <p style="color: #555555; font-size: 16px;">
                              Vous avez demandé la réinitialisation de votre mot de passe sur la plateforme de l'AMC.
                            </p>
                            <p style="color: #555555; font-size: 16px;">
                              Pour définir un nouveau mot de passe, cliquez sur le bouton ci-dessous :
                            </p>
                            <a href="@@{resetUrl}"
                               style="display: inline-block; padding: 12px 24px; margin: 20px 0; font-size: 16px; color: #ffffff; background-color: #dc3545; text-decoration: none; border-radius: 4px;">
                              Réinitialiser mon mot de passe
                            </a>
                            <p style="color: #999999; font-size: 14px; margin-top: 20px;">
                              Si le bouton ne fonctionne pas, copiez-collez ce lien dans votre navigateur :<br>
                              <a href="@@{resetUrl}" style="color: #dc3545;">@@{resetUrl}</a>
                            </p>
                            <p style="color: #999999; font-size: 14px; margin-top: 20px;">
                              Si vous n'êtes pas à l'origine de cette demande, vous pouvez ignorer cet e-mail.
                            </p>
                            <hr style="border: none; border-top: 1px solid #eeeeee; margin: 30px 0;">
                            <p style="color: #555555; font-size: 14px; margin-top: 20px;">
                              Bien cordialement,<br>
                              <strong>L'équipe de l'Association Musulmane du Chablais</strong>
                            </p>
                          </td>
                        </tr>
                      </table>
                    </body>
                    </html>
